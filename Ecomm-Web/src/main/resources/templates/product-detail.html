<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' | RAJify'">Product | RAJify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
<main class="container detail-page">
    <div class="detail-topbar">
        <a th:href="@{/}" class="back-link">← Back to products</a>
        <div class="nav-actions">
            <button type="button" id="themeToggle" class="theme-toggle dark-chip" aria-label="Toggle dark mode">
                <span class="theme-icon">moon</span>
                <span class="theme-label">Dark</span>
            </button>
            <a class="auth-chip dark-chip" th:if="${currentUser == null}" th:href="@{/auth}">Login</a>
            <a class="auth-chip dark-chip" th:href="@{/checkout}">Checkout</a>
        </div>
    </div>
    <section class="detail-card">
        <img th:src="${product.imageUrl}" th:alt="${product.name}">
        <div>
            <span class="product-category" th:text="${product.category}"></span>
            <h1 th:text="${product.name}"></h1>
            <p class="detail-description" th:text="${product.description}"></p>
            <p class="detail-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></p>
            <p class="detail-rating" th:text="'Rating: ★ ' + ${product.rating}"></p>
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                <button class="detail-btn" type="submit">Add to Cart</button>
            </form>
            <p class="cart-hint">Items in cart: <strong th:text="${cartCount}"></strong></p>
        </div>
    </section>
</main>
</body>
</html>
