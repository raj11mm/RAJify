<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | RAJify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
<main class="container confirmation-page">
    <div class="detail-topbar">
        <a th:href="@{/}" class="back-link">← Back to home</a>
        <button type="button" id="themeToggle" class="theme-toggle dark-chip" aria-label="Toggle dark mode">
            <span class="theme-icon">moon</span>
            <span class="theme-label">Dark</span>
        </button>
    </div>
    <section class="auth-card confirmation-card">
        <h1>Order Confirmed</h1>
        <p>Thank you for shopping with RAJify.</p>
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Total:</strong> $<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span></p>
        <p><strong>Shipping To:</strong> <span th:text="${order.shippingAddress}"></span></p>
        <p class="muted">Placed on <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}"></span></p>
        <a class="primary-link dark-link" th:href="@{/}">Back to Home</a>
    </section>
</main>
</body>
</html>
